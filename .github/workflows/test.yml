name: Test Run
on: [push]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Code
        uses: actions/checkout@v4

      - name: Setup Python Venv
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flake8
        run: pip install flake8

      - name: Check Syntax
        run: flake8 . --count --select=E9,F63,F7,F82

  #Old docker build test

  #  docker-build:
  #    runs-on: ubuntu-latest
  #    needs: lint-test
  #    steps:
  #      - name: Clone Code
  #        uses: actions/checkout@v4
  #
  #      - name: Build Docker
  #        run: |
  #          echo "Build Docker"
  #          docker build -t practice_app:latest .

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

