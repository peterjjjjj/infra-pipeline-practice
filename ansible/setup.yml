---
#Play 1, setup system.
- name: Prepare venv
  hosts: web_servers
  become: true
  tasks:
    - name: Install Docker and Python dependencies
      apt:
        name: [docker.io, docker-compose-v2, python3-pip]
        update_cache: yes
        state: present

    - name: Install Docker SDK for Python
      pip:
        name: docker

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Reset connection to pick up group changes
      meta: reset_connection